name: Check Commit Message

on:
  pull_request:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          INVALID=0

          PATTERN='^\[(FEAT|FIX|HOTFIX|REFACTOR|TEST|CHORE|DOCS|STYLE|PERF)\] .+'

          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qP "$PATTERN"; then
              echo "❌ 올바르지 않은 커밋 메시지: $msg"
              INVALID=1
            fi
          done < <(git log --pretty=format:"%s" "$BASE".."$HEAD")

          if [ $INVALID -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "  커밋 메시지 규칙"
            echo "========================================"
            echo ""
            echo "  형식: [PREFIX] 제목"
            echo ""
            echo "  PREFIX 목록:"
            echo "    [FEAT]      새로운 기능 추가"
            echo "    [FIX]       버그 수정"
            echo "    [HOTFIX]    프로덕션 긴급 버그 수정"
            echo "    [REFACTOR]  기능 변경 없는 코드 개선"
            echo "    [TEST]      테스트 코드 추가/수정"
            echo "    [CHORE]     빌드 설정, 의존성, 개발 환경"
            echo "    [DOCS]      문서 작성/수정"
            echo "    [STYLE]     포맷 등 로직 무관 스타일"
            echo "    [PERF]      성능 개선"
            echo ""
            echo "  예시:"
            echo "    [FEAT] 월드맵 UI 구현"
            echo "    [FIX] 경매 입찰 금액 음수 처리 오류 수정"
            echo "    [CHORE] Spring Boot 의존성 추가"
            echo "    [DOCS] README 작성"
            echo ""
            echo "  이슈 연결은 커밋 본문에 작성하세요:"
            echo "    Closes #번호     → PR 머지 시 이슈 자동 Close"
            echo "    Related to #번호 → 이슈 연결만 (Close 안 함)"
            echo "    Ref #번호        → 단순 참고용 연결"
            echo "========================================"
            exit 1
          fi

          echo "✅ 모든 커밋 메시지 형식이 올바릅니다."
