name: Check PR Title

on:
  pull_request:
    branches: [dev, main]
    types: [opened, edited, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # [PREFIX][SCOPE] #이슈번호 - 설명
          # SCOPE: FE | BE | ALL
          PATTERN='^\[(FEAT|FIX|HOTFIX|REFACTOR|TEST|CHORE|DOCS|STYLE|PERF)\]\[(FE|BE|ALL)\] #[0-9]+ - .+'
          if ! echo "$PR_TITLE" | grep -qP "$PATTERN"; then
            echo "❌ PR 제목 형식 오류: $PR_TITLE"
            echo ""
            echo "올바른 형식: [PREFIX][SCOPE] #이슈번호 - 작업 내용 요약"
            echo "PREFIX: FEAT | FIX | HOTFIX | REFACTOR | TEST | CHORE | DOCS | STYLE | PERF"
            echo "SCOPE:  FE (프론트엔드) | BE (백엔드) | ALL (공통)"
            echo ""
            echo "예시:"
            echo "  [FEAT][FE] #12 - 영토 맵 페이지 구현"
            echo "  [FEAT][BE] #34 - 경매 입찰 API 구현"
            echo "  [CHORE][ALL] #2 - GitHub Actions 워크플로우 추가"
            exit 1
          fi
          echo "✅ PR 제목 형식이 올바릅니다."
